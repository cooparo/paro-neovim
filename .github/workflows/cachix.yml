name: Build and cache

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v16
        with:
          name: paro-neovim
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - run: |
          nix build .#default --print-out-paths | cachix push paro-neovim
          nix build .#nord --print-out-paths | cachix push paro-neovim
          nix build .#everforest --print-out-paths | cachix push paro-neovim
          nix build .#catppuccin --print-out-paths | cachix push paro-neovim
          nix build .#gruvbox --print-out-paths | cachix push paro-neovim
